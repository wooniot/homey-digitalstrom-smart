<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
    .status { padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-weight: 600; }
    .status.valid { background: #d4edda; color: #155724; }
    .status.invalid { background: #f8d7da; color: #721c24; }
    .status.free { background: #fff3cd; color: #856404; }
    button { background: #00A651; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #008f45; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h2>Digital Strom Smart - Settings</h2>

  <div id="licenseStatus" class="status free">Free tier active</div>

  <div class="field">
    <label>Pro License Key</label>
    <input type="text" id="licenseKey" placeholder="PRO-XXXX-XXXX-XXXX-XXXX" />
    <div class="hint">Enter your license key to unlock Pro features: climate control, presence modes, weather sensors, alarms, blink & save scene.</div>
  </div>

  <button id="saveBtn">Save</button>

  <script>
    function onHomeyReady(Homey) {
      Homey.ready();

      const keyInput = document.getElementById('licenseKey');
      const statusEl = document.getElementById('licenseStatus');
      const saveBtn = document.getElementById('saveBtn');

      // Load current license
      Homey.api('GET', '/license', null, (err, result) => {
        if (err) return;
        keyInput.value = result.key || '';
        updateStatus(result);
      });

      saveBtn.addEventListener('click', () => {
        const key = keyInput.value.trim();
        Homey.api('PUT', '/license', { key }, (err, result) => {
          if (err) {
            Homey.alert('Error saving license: ' + err.message);
            return;
          }
          updateStatus(result);
          Homey.alert(result.valid ? 'Pro license activated!' : 'Free tier active');
        });
      });

      function updateStatus(result) {
        if (result.valid) {
          statusEl.className = 'status valid';
          statusEl.textContent = 'Pro license active (' + (result.type || 'pro') + ')';
        } else if (keyInput.value.trim()) {
          statusEl.className = 'status invalid';
          statusEl.textContent = 'License invalid or expired';
        } else {
          statusEl.className = 'status free';
          statusEl.textContent = 'Free tier active';
        }
      }
    }
  </script>
</body>
</html>
